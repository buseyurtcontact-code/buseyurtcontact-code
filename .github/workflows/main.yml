name: Generate Snake

on:
  schedule:
    # Her 6 saatte bir otomatik çalışır
    - cron: "0 */6 * * *"
  workflow_dispatch: # Manuel çalıştırmayı sağlar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Sürüm v4'e güncellendi (Hata almanı engeller)
      - uses: actions/checkout@v4

      # Sürüm v3'e güncellendi (Daha stabil çalışır)
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: buseyurtcontact-code
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif

      # Oluşturulan dosyaları 'output' branch'ine yükler
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
